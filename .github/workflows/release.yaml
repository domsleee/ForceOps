name: release
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  release:
    name: ${{ matrix.target }}
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Get version
        id: get_version
        shell: bash
        run: echo "version=$(dotnet msbuild Directory.Build.props -getProperty:Version)" >> "$GITHUB_OUTPUT"

      - name: Print Current Version
        run: |
          echo Current Version: ${{ steps.get_version.outputs.version }}

      - name: Directory structure
        run: |
          ls

      - name: Dotnet Installation Info
        run: dotnet --info

      - name: Pack
        run: |
          dotnet pack -c release /p:ContinuousIntegrationBuild=true
          dotnet pack ForceOps -c release -r win-x64 /p:ContinuousIntegrationBuild=true
          dotnet pack ForceOps -c release -r any -p:PublishAot=false /p:ContinuousIntegrationBuild=true

      # The .sha256 sidecar is used by the scoop bucket's autoupdate
      # (https://github.com/domsleee/scoop-bucket).
      - name: Create sha256 for release exe
        run: |
          $exe = "ForceOps/bin/release/net10.0/win-x64/publish/ForceOps.exe"
          (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower() | Set-Content -NoNewline "$exe.sha256"

      - name: Create release
        if: ${{ github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore(release)') }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "${{ steps.get_version.outputs.version }}"
          files: |
            ForceOps/bin/release/net10.0/win-x64/publish/ForceOps.exe
            ForceOps/bin/release/net10.0/win-x64/publish/ForceOps.exe.sha256
          tag_name: "${{ steps.get_version.outputs.version }}"

      # RID-specific packages must be on the feed before the top-level pointer
      # package, so the pointer package is pushed in a second step.
      - name: Publish NuGet (RID packages)
        if: ${{ github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore(release)') }}
        run: dotnet nuget push -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json ForceOps/nupkg/ForceOps.win-x64.${{ steps.get_version.outputs.version }}.nupkg ForceOps/nupkg/ForceOps.any.${{ steps.get_version.outputs.version }}.nupkg ForceOps.Lib/nupkg/ForceOps.Lib.${{ steps.get_version.outputs.version }}.nupkg ForceOps.Lib/nupkg/ForceOps.Lib.${{ steps.get_version.outputs.version }}.snupkg --skip-duplicate

      - name: Publish NuGet (pointer package)
        if: ${{ github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore(release)') }}
        run: dotnet nuget push -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json ForceOps/nupkg/ForceOps.${{ steps.get_version.outputs.version }}.nupkg --skip-duplicate
